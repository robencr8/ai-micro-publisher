name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

      - name: Run tests
        run: pnpm test
        env:
          # CI uses no real DB/Redis — tests are unit-only and must not require live services
          NODE_ENV: test

      - name: Build check
        run: pnpm build
        env:
          # Stub env vars so Vite build doesn't fail on missing vars
          VITE_APP_ID: ci-test
          VITE_OAUTH_PORTAL_URL: https://example.com
          VITE_FRONTEND_FORGE_API_URL: https://example.com
          VITE_FRONTEND_FORGE_API_KEY: ci-test-key
